# CI for wise-bank
#
# All tooling (Go, nushell) and task logic live in mise.toml — the SAME
# `mise run ...` commands work locally and in CI.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: CI (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Build
        run: mise run build

      - name: Test
        run: mise run test

      - name: Lint
        run: mise run lint
        continue-on-error: true
