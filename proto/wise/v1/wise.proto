// Wise Platform API as a ConnectRPC contract.
//
// Rust-first: codegen target is `connectrpc-build` (build.rs) for the server +
// `protoc-gen-es` for the TS client, matching joeblew999/google_maps. See
// docs/connectrpc.md for the full endpoint catalog and implementation plan.
//
// Messages are deliberately SLIM (the fields a client/GUI needs), not 1:1 mirrors
// of Wise's full JSON. Each RPC comments the REST endpoint it fronts.
// ⚠️ = path/version should be confirmed against the live docs before implementing.

syntax = "proto3";

package wise.v1;

// ---------------------------------------------------------------------------
// Shared types
// ---------------------------------------------------------------------------

// Monetary amount with ISO-4217 currency.
message Money {
  double value = 1;
  string currency = 2;
}

enum ProfileType {
  PROFILE_TYPE_UNSPECIFIED = 0;
  PROFILE_TYPE_PERSONAL = 1;
  PROFILE_TYPE_BUSINESS = 2;
}

// Wise transfer lifecycle status.
enum TransferStatus {
  TRANSFER_STATUS_UNSPECIFIED = 0;
  TRANSFER_STATUS_INCOMING_PAYMENT_WAITING = 1;
  TRANSFER_STATUS_PROCESSING = 2;
  TRANSFER_STATUS_FUNDS_CONVERTED = 3;
  TRANSFER_STATUS_OUTGOING_PAYMENT_SENT = 4;
  TRANSFER_STATUS_CANCELLED = 5;
  TRANSFER_STATUS_FUNDS_REFUNDED = 6;
  TRANSFER_STATUS_BOUNCED_BACK = 7;
}

// ---------------------------------------------------------------------------
// ProfileService — /v2/profiles
// ---------------------------------------------------------------------------

message Profile {
  int64 id = 1;
  ProfileType type = 2;
  string full_name = 3; // personal: name; business: company name
}

message ListProfilesRequest {}
message ListProfilesResponse { repeated Profile profiles = 1; }

message GetProfileRequest { int64 profile_id = 1; }
message GetProfileResponse { Profile profile = 1; }

service ProfileService {
  // GET /v2/profiles
  rpc ListProfiles(ListProfilesRequest) returns (ListProfilesResponse);
  // GET /v2/profiles/{profileId}
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
}

// ---------------------------------------------------------------------------
// RateService — /v1/rates
// ---------------------------------------------------------------------------

message Rate {
  string source = 1;
  string target = 2;
  double rate = 3;
  string time = 4; // ISO-8601
}

message GetRateRequest {
  string source = 1;
  string target = 2;
}
message GetRateResponse { Rate rate = 1; }

message GetRateHistoryRequest {
  string source = 1;
  string target = 2;
  string from = 3;  // ISO-8601
  string to = 4;    // ISO-8601
  string group = 5; // "day" | "hour" | "minute"
}
message GetRateHistoryResponse { repeated Rate rates = 1; }

service RateService {
  // GET /v1/rates?source=&target=
  rpc GetRate(GetRateRequest) returns (GetRateResponse);
  // GET /v1/rates?source=&target=&from=&to=&group=
  rpc GetRateHistory(GetRateHistoryRequest) returns (GetRateHistoryResponse);
}

// ---------------------------------------------------------------------------
// QuoteService — /v3/profiles/{id}/quotes
// ---------------------------------------------------------------------------

message Quote {
  string id = 1;
  Money source = 2;
  Money target = 3;
  double rate = 4;
  string pay_out = 5;        // BANK_TRANSFER | BALANCE | ...
  string rate_expiration = 6; // ISO-8601
}

message CreateQuoteRequest {
  int64 profile_id = 1;
  string source_currency = 2;
  string target_currency = 3;
  // Exactly one of the amounts is set; the other is computed.
  double source_amount = 4;
  double target_amount = 5;
  string pay_out = 6;
}
message CreateQuoteResponse { Quote quote = 1; }

message GetQuoteRequest {
  int64 profile_id = 1;
  string quote_id = 2;
}
message GetQuoteResponse { Quote quote = 1; }

message UpdateQuoteRequest {
  int64 profile_id = 1;
  string quote_id = 2;
  string pay_out = 3;
  int64 target_account_id = 4; // recipient account
}
message UpdateQuoteResponse { Quote quote = 1; }

service QuoteService {
  // POST /v3/profiles/{profileId}/quotes
  rpc CreateQuote(CreateQuoteRequest) returns (CreateQuoteResponse);
  // GET /v3/profiles/{profileId}/quotes/{quoteId}
  rpc GetQuote(GetQuoteRequest) returns (GetQuoteResponse);
  // PATCH /v3/profiles/{profileId}/quotes/{quoteId}
  rpc UpdateQuote(UpdateQuoteRequest) returns (UpdateQuoteResponse);
}

// ---------------------------------------------------------------------------
// RecipientService — /v1/accounts (+ requirements)
// ---------------------------------------------------------------------------

message Recipient {
  int64 id = 1;
  string currency = 2;
  string type = 3;        // sort_code | iban | aba | ...
  string account_holder_name = 4;
  string country = 5;
}

message CreateRecipientRequest {
  int64 profile_id = 1;
  string currency = 2;
  string type = 3;
  string account_holder_name = 4;
  // Dynamic per-currency fields (discover via GetAccountRequirements).
  map<string, string> details = 5;
}
message CreateRecipientResponse { Recipient recipient = 1; }

message ListRecipientsRequest {
  int64 profile_id = 1;
  string currency = 2; // optional filter
}
message ListRecipientsResponse { repeated Recipient recipients = 1; }

message GetRecipientRequest { int64 account_id = 1; }
message GetRecipientResponse { Recipient recipient = 1; }

message DeleteRecipientRequest { int64 account_id = 1; }
message DeleteRecipientResponse {}

// Dynamic-form field descriptor (slimmed).
message RequirementField {
  string key = 1;
  string name = 2;
  string type = 3;     // text | select | radio | date
  bool required = 4;
  string example = 5;
}
message GetAccountRequirementsRequest { string quote_id = 1; }
message GetAccountRequirementsResponse { repeated RequirementField fields = 1; }

service RecipientService {
  // POST /v1/accounts
  rpc CreateRecipient(CreateRecipientRequest) returns (CreateRecipientResponse);
  // GET /v1/accounts?profile=&currency=
  rpc ListRecipients(ListRecipientsRequest) returns (ListRecipientsResponse);
  // GET /v1/accounts/{accountId}
  rpc GetRecipient(GetRecipientRequest) returns (GetRecipientResponse);
  // DELETE /v1/accounts/{accountId}
  rpc DeleteRecipient(DeleteRecipientRequest) returns (DeleteRecipientResponse);
  // GET /v1/quotes/{quoteId}/account-requirements
  rpc GetAccountRequirements(GetAccountRequirementsRequest) returns (GetAccountRequirementsResponse);
}

// ---------------------------------------------------------------------------
// TransferService — /v1/transfers (+ /v3 funding)
// ---------------------------------------------------------------------------

message Transfer {
  int64 id = 1;
  string quote_id = 2;
  int64 target_account_id = 3;
  TransferStatus status = 4;
  Money source = 5;
  Money target = 6;
  string reference = 7;
  string created = 8; // ISO-8601
}

message CreateTransferRequest {
  string quote_id = 1;
  int64 target_account_id = 2;
  string customer_transaction_id = 3; // UUID, idempotency
  string reference = 4;
}
message CreateTransferResponse { Transfer transfer = 1; }

message GetTransferRequest { int64 transfer_id = 1; }
message GetTransferResponse { Transfer transfer = 1; }

message ListTransfersRequest {
  int64 profile_id = 1;
  TransferStatus status = 2; // optional filter
  int32 offset = 3;
  int32 limit = 4;
}
message ListTransfersResponse { repeated Transfer transfers = 1; }

message CancelTransferRequest { int64 transfer_id = 1; }
message CancelTransferResponse { Transfer transfer = 1; }

// Funding from a Wise balance. Requires SCA (signed request) — see docs/connectrpc.md.
message FundTransferRequest {
  int64 profile_id = 1;
  int64 transfer_id = 2;
  string type = 3; // "BALANCE"
}
message FundTransferResponse {
  int64 transfer_id = 1;
  string status = 2; // COMPLETED | REJECTED
}

service TransferService {
  // POST /v1/transfers
  rpc CreateTransfer(CreateTransferRequest) returns (CreateTransferResponse);
  // GET /v1/transfers/{transferId}
  rpc GetTransfer(GetTransferRequest) returns (GetTransferResponse);
  // GET /v1/transfers?profile=&status=
  rpc ListTransfers(ListTransfersRequest) returns (ListTransfersResponse);
  // PUT /v1/transfers/{transferId}/cancel
  rpc CancelTransfer(CancelTransferRequest) returns (CancelTransferResponse);
  // POST /v3/profiles/{profileId}/transfers/{transferId}/payments
  rpc FundTransfer(FundTransferRequest) returns (FundTransferResponse);
}

// ---------------------------------------------------------------------------
// BalanceService — /v4 balances (+ /v2 movements)
// ---------------------------------------------------------------------------

message Balance {
  int64 id = 1;
  string type = 2; // STANDARD | SAVINGS
  Money amount = 3;
  Money reserved = 4;
}

message ListBalancesRequest {
  int64 profile_id = 1;
  string types = 2; // default "STANDARD"
}
message ListBalancesResponse { repeated Balance balances = 1; }

message OpenBalanceRequest {
  int64 profile_id = 1;
  string currency = 2;
  string type = 3; // STANDARD | SAVINGS
}
message OpenBalanceResponse { Balance balance = 1; }

message CloseBalanceRequest {
  int64 profile_id = 1;
  int64 balance_id = 2;
}
message CloseBalanceResponse {}

// Convert/move funds between balances. Quote must use payOut=BALANCE. SCA required.
message ConvertRequest {
  int64 profile_id = 1;
  string quote_id = 2;
}
message ConvertResponse {
  int64 id = 1;
  string status = 2;
}

service BalanceService {
  // GET /v4/profiles/{profileId}/balances?types=STANDARD
  rpc ListBalances(ListBalancesRequest) returns (ListBalancesResponse);
  // POST /v4/profiles/{profileId}/balances
  rpc OpenBalance(OpenBalanceRequest) returns (OpenBalanceResponse);
  // DELETE /v4/profiles/{profileId}/balances/{balanceId}
  rpc CloseBalance(CloseBalanceRequest) returns (CloseBalanceResponse);
  // POST /v2/profiles/{profileId}/balance-movements
  rpc Convert(ConvertRequest) returns (ConvertResponse);
}

// ---------------------------------------------------------------------------
// StatementService — /v1 balance statements
// ---------------------------------------------------------------------------

message Transaction {
  string date = 1; // ISO-8601
  string type = 2; // CREDIT | DEBIT
  Money amount = 3;
  string description = 4;
}

message GetStatementRequest {
  int64 profile_id = 1;
  int64 balance_id = 2;
  string from = 3; // ISO-8601
  string to = 4;   // ISO-8601
}
message GetStatementResponse { repeated Transaction transactions = 1; }

service StatementService {
  // GET /v1/profiles/{profileId}/balance-statements/{balanceId}/statement.json
  rpc GetStatement(GetStatementRequest) returns (GetStatementResponse);
}

// ---------------------------------------------------------------------------
// ActivityService — /v1 activities
// ---------------------------------------------------------------------------

message Activity {
  string id = 1;
  string type = 2;
  string status = 3;
  string title = 4;
  Money amount = 5;
  string created = 6; // ISO-8601
}

message ListActivitiesRequest {
  int64 profile_id = 1;
  int32 size = 2;
}
message ListActivitiesResponse { repeated Activity activities = 1; }

service ActivityService {
  // GET /v1/profiles/{profileId}/activities
  rpc ListActivities(ListActivitiesRequest) returns (ListActivitiesResponse);
}

// ---------------------------------------------------------------------------
// WebhookService — /v3 subscriptions
// ---------------------------------------------------------------------------

message Subscription {
  string id = 1;
  string name = 2;
  string trigger_on = 3; // e.g. transfers#state-change
  string delivery_url = 4;
  string delivery_version = 5;
}

message CreateSubscriptionRequest {
  int64 profile_id = 1;
  string name = 2;
  string trigger_on = 3;
  string delivery_url = 4;
}
message CreateSubscriptionResponse { Subscription subscription = 1; }

message ListSubscriptionsRequest { int64 profile_id = 1; }
message ListSubscriptionsResponse { repeated Subscription subscriptions = 1; }

message DeleteSubscriptionRequest {
  int64 profile_id = 1;
  string subscription_id = 2;
}
message DeleteSubscriptionResponse {}

service WebhookService {
  // POST /v3/profiles/{profileId}/subscriptions
  rpc CreateSubscription(CreateSubscriptionRequest) returns (CreateSubscriptionResponse);
  // GET /v3/profiles/{profileId}/subscriptions
  rpc ListSubscriptions(ListSubscriptionsRequest) returns (ListSubscriptionsResponse);
  // DELETE /v3/profiles/{profileId}/subscriptions/{id}
  rpc DeleteSubscription(DeleteSubscriptionRequest) returns (DeleteSubscriptionResponse);
}

// ---------------------------------------------------------------------------
// ⚠️ CardService / BatchService — paths to confirm against live docs.
//    Stubbed here so the contract is complete; flesh out before implementing.
// ---------------------------------------------------------------------------

message CardOrderAvailabilityRequest { int64 profile_id = 1; }
message CardOrderAvailabilityResponse { bool available = 1; repeated string programs = 2; }

service CardService {
  rpc GetCardOrderAvailability(CardOrderAvailabilityRequest) returns (CardOrderAvailabilityResponse);
}

message CreateBatchGroupRequest {
  int64 profile_id = 1;
  string name = 2;
  string source_currency = 3;
}
message CreateBatchGroupResponse { string batch_group_id = 1; string status = 2; }

service BatchService {
  rpc CreateBatchGroup(CreateBatchGroupRequest) returns (CreateBatchGroupResponse);
}
