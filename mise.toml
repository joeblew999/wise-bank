# mise.toml — tool manager + task runner for wise-bank
#
# Tasks are namespaced by function. `mise tasks` shows the dev-facing set; plumbing
# (deps, build variants, CI, advanced auth) is `hide = true` — still runnable, just
# not listed. The headline:  mise run mcp:openapi  → the whole Wise API as MCP.
#
#   mcp:*      run Wise as MCP (openapi = whole API off the spec; go = hand-written)
#   serve:*    web GUI dashboard
#   cli:*      one-shot Wise calls via the Go CLI
#   secrets:*  credentials (fnox + OS keychain)
#   spec:*     vendor + normalize the official OpenAPI
#   build:*    compile the Go binaries
#   test       run tests
#
# AUTH: WISE_API_TOKEN is all you need for your own account. OAuth (WISE_CLIENT_ID/
# SECRET) is an OPTIONAL alternative — partner / multi-user only (the `:oauth` tasks).

[tools]
go = "1.26.1"
# nushell drives OS-neutral file ops + URL opening in tasks; pinned so CI gets it.
"github:nushell/nushell" = "latest"
# node powers the OpenAPI 3.1->3.0 normalize pipeline (downconvert + js-yaml).
node = "24.16.0"
# restish turns the OpenAPI into a CLI where every Wise endpoint is a command (api:*).
"go:github.com/rest-sh/restish" = "latest"
# (fnox is a ubiquitous tool from the global mise config — not pinned per-repo.)

[env]
GOWORK = "off"
WISE_PORT = "{{ env.WISE_PORT | default(value='8080') }}"
BIN = "{{ config_root }}/.bin"

# ============================ mcp:  run Wise as MCP ============================

[tasks."mcp:openapi"]
description = "▶ Run the WHOLE Wise API (239 ops) as an MCP server, off the local spec"
depends = ["spec:normalize"]
run = "go run github.com/merzzzl/openapi-mcp-server/cmd/app@latest -config openapi-mcp.yaml"

[tasks."mcp:go"]
description = "Run the hand-written Go MCP server (curated subset of tools)"
run = "fnox exec --profile wise --no-defaults -- go run ./cmd/wise-mcp"

[tasks."mcp:oauth"]
description = "OPTIONAL partner mode: Go MCP server with OAuth instead of the API token"
hide = true
run = "fnox exec --profile oauth --no-defaults -- go run ./cmd/wise-mcp"

# ============================ serve:  web dashboard ============================

[tasks."serve:web"]
description = "Start the web GUI dashboard (API-token auth)"
run = "fnox exec --profile wise --no-defaults -- go run ./cmd/wise-server -port {{ env.WISE_PORT }}"

[tasks."serve:oauth"]
description = "OPTIONAL partner mode: web GUI with OAuth instead of the API token"
hide = true
run = "fnox exec --profile oauth --no-defaults -- go run ./cmd/wise-server -port {{ env.WISE_PORT }}"

# ============== api:  the WHOLE Wise API as a CLI (restish + spec) =============
# Every endpoint is a command. cli:* (below) is a hand-written convenience subset;
# api:* is the full ~205-command surface generated from the OpenAPI.

[tasks."api:setup"]
description = "Register the whole Wise API with restish (run once after install)"
depends = ["spec:normalize"]
run = "nu scripts/setup-restish.nu"

[tasks.api]
description = "Whole Wise API CLI (prod). e.g. mise run api -- rate-get --source=USD --target=EUR ; mise run api -- --help"
run = "fnox exec --profile wise --no-defaults -- restish wise"

[tasks."api:sandbox"]
description = "Whole Wise API CLI against the SANDBOX. e.g. mise run api:sandbox -- rate-get --source=USD --target=EUR"
run = "fnox exec --profile sandbox --no-defaults -- restish wise-sandbox"

[tasks."api:list"]
description = "List every Wise API command restish generated from the spec"
run = "restish wise --help"

# ===================== cli:  one-shot Wise calls (Go CLI) =====================

[tasks."cli:rates"]
description = "Get exchange rates from the Wise API"
run = "fnox exec --profile wise --no-defaults -- go run ./cmd/wise-cli -cmd rates"

[tasks."cli:profiles"]
description = "List Wise profiles"
run = "fnox exec --profile wise --no-defaults -- go run ./cmd/wise-cli -cmd profiles"

[tasks."cli:balances"]
description = "Show account balances"
run = "fnox exec --profile wise --no-defaults -- go run ./cmd/wise-cli -cmd balances"

[tasks."cli:statements"]
description = "Show transaction history (last 30 days)"
run = "fnox exec --profile wise --no-defaults -- go run ./cmd/wise-cli -cmd statements"

[tasks."cli:quote"]
description = "Get a quote, e.g. mise run cli:quote -- -from USD -to EUR -amount 100"
run = "fnox exec --profile wise --no-defaults -- go run ./cmd/wise-cli -cmd quote"

[tasks."cli:rate-history"]
description = "Rate history, e.g. mise run cli:rate-history -- -from EUR -to USD -days 7"
run = "fnox exec --profile wise --no-defaults -- go run ./cmd/wise-cli -cmd rate-history"

# ===================== secrets:  fnox + OS keychain ===========================

[tasks."secrets:open"]
description = "Open the Wise pages where you create the API token / OAuth app"
run = '''
nu -c '
  print "Grab your Wise credentials from:";
  print "REQUIRED — your API token (all you need for your own account):";
  print "  • Production API token  : https://wise.com/your-account/integrations-and-tools/api-tokens";
  print "  • Sandbox API token     : https://sandbox.transferwise.tech/your-account/integrations-and-tools/api-tokens";
  print "";
  print "OPTIONAL — partner / multi-user OAuth mode only (NOT needed otherwise):";
  print "  • OAuth / user tokens   : https://docs.wise.com/api-reference/user-tokens";
  print "  • Auth & security guide : https://docs.wise.com/guides/developer/auth-and-security";
  print "";
  print "Store:  mise run secrets:set  (prod) · secrets:set-sandbox · secrets:set-oauth";
  print "Check:  mise run secrets:status";
  start "https://wise.com/your-account/integrations-and-tools/api-tokens";
  start "https://sandbox.transferwise.tech/your-account/integrations-and-tools/api-tokens"
'
'''

[tasks."secrets:status"]
description = "Show which Wise secrets are set (prod / sandbox / oauth) — values never shown"
run = "nu scripts/secrets-status.nu"

[tasks."secrets:set"]
description = "Open the Wise pages, then store WISE_API_TOKEN in the OS keychain (prompts)"
depends = ["secrets:open"]
run = "fnox set WISE_API_TOKEN -p keychain --profile wise"

[tasks."secrets:set-sandbox"]
description = "Open the Wise SANDBOX token page, then store WISE_SANDBOX_API_TOKEN (prompts)"
run = [
  '''nu -c '
    print "The Wise SANDBOX is a SEPARATE environment — you CANNOT use your real Wise account.";
    print "  1. Register a sandbox-only account: https://sandbox.transferwise.tech/register";
    print "  2. Finish onboarding, then create a token at:";
    print "     https://sandbox.transferwise.tech/your-account/integrations-and-tools/api-tokens";
    start "https://sandbox.transferwise.tech/register"
  ' ''',
  # --key-name is REQUIRED: it writes the token to the WISE_SANDBOX_API_TOKEN keychain
  # item. Without it, fnox set rewrites the mapping to value=WISE_API_TOKEN and
  # OVERWRITES the production token in the keychain.
  "fnox set WISE_API_TOKEN -p keychain --profile sandbox --key-name WISE_SANDBOX_API_TOKEN",
]

[tasks."secrets:check"]
description = "Verify the wise secrets are configured"
run = "fnox check --profile wise --no-defaults"

[tasks."secrets:set-token"]
description = "Store just WISE_API_TOKEN in the OS keychain (no browser)"
hide = true
run = "fnox set WISE_API_TOKEN -p keychain --profile wise"

[tasks."secrets:set-oauth"]
description = "OPTIONAL (partner/multi-user only): store WISE_CLIENT_ID + WISE_CLIENT_SECRET"
run = [
  "fnox set WISE_CLIENT_ID -p keychain --profile oauth",
  "fnox set WISE_CLIENT_SECRET -p keychain --profile oauth",
]

[tasks."secrets:list"]
description = "List the wise secret names (values stay in the keychain)"
hide = true
run = "fnox ls --profile wise --no-defaults"

[tasks."secrets:doctor"]
description = "fnox diagnostics (providers, keychain access, config)"
hide = true
run = "fnox doctor"

# ===================== spec:  vendor + normalize OpenAPI ======================

[tasks."spec:fetch"]
description = "Download the official Wise OpenAPI spec + regenerate the endpoint index"
run = [
  "curl -sSL https://docs.wise.com/_bundle/api-reference/index.yaml -o docs/reference/wise-openapi.yaml",
  "nu scripts/gen-endpoint-index.nu",
]

[tasks."spec:normalize"]
description = "Normalize 3.1 -> 3.0 so strict OpenAPI tools accept it (dep of mcp:openapi)"
hide = true
sources = ["docs/reference/wise-openapi.yaml", "scripts/normalize-spec.cjs"]
outputs = ["docs/reference/wise-openapi-3.0.yaml"]
run = [
  "npx -y @apiture/openapi-down-convert --input docs/reference/wise-openapi.yaml --output docs/reference/wise-openapi-3.0.yaml",
  "npm install --no-save --no-audit --no-fund js-yaml@4",
  "node scripts/normalize-spec.cjs",
]

# ============================ build / test ====================================

[tasks."build:all"]
description = "Build all Go binaries into ./.bin"
run = [
  "nu -c 'mkdir {{ env.BIN }}'",
  "go build -o {{ env.BIN }}/wise-cli ./cmd/wise-cli",
  "go build -o {{ env.BIN }}/wise-mcp ./cmd/wise-mcp",
  "go build -o {{ env.BIN }}/wise-server ./cmd/wise-server",
]

[tasks.smoke]
description = "Verify setup: tools, spec, restish config (offline — no keychain, no prompts)"
run = "nu scripts/smoke.nu"

[tasks."smoke:auth"]
description = "Also verify live prod+sandbox auth (READS the keychain — macOS may prompt)"
run = "nu scripts/smoke.nu --auth"

[tasks.test]
description = "Run tests"
run = "go test ./..."

[tasks."build:mcp"]
description = "Build just the Go MCP server binary into ./.bin"
hide = true
run = [
  "nu -c 'mkdir {{ env.BIN }}'",
  "go build -o {{ env.BIN }}/wise-mcp ./cmd/wise-mcp",
]

[tasks."build:server"]
description = "Build just the web server binary into ./.bin"
hide = true
run = [
  "nu -c 'mkdir {{ env.BIN }}'",
  "go build -o {{ env.BIN }}/wise-server ./cmd/wise-server",
]

[tasks.lint]
description = "Run go vet"
hide = true
run = "go vet ./..."

[tasks.clean]
description = "Remove built binaries"
hide = true
run = "nu -c 'rm -rf {{ env.BIN }}'"
